<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>FirmaPro — Google Play'e yönlendiriliyor</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta http-equiv="refresh" content="1; url=https://play.google.com/store/apps/details?id=com.iscim.iscim" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at 50% 40%, #0F3030 0%, #061818 65%, #020808 100%);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .card { max-width: 460px; width: 100%; text-align: center; }
    .icon {
      width: 130px; height: 130px;
      border-radius: 30px;
      overflow: hidden;
      margin: 0 auto 28px;
      border: 3px solid #2BBFB2;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 60px rgba(43,191,178,0.3);
    }
    .icon img { width: 100%; height: 100%; display: block; }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    h1 .accent { color: #2BBFB2; }
    .subtitle { font-size: 15px; color: #B0E5DE; opacity: 0.75; margin-bottom: 36px; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 24px;
      border: 3px solid rgba(43,191,178,0.25);
      border-top-color: #2BBFB2;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 16px; font-weight: 500; opacity: 0.85; margin-bottom: 28px; }
    .actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #2BBFB2 0%, #0E847B 100%);
      color: #051210;
      padding: 16px 28px;
      border-radius: 14px;
      font-size: 15px; font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(43,191,178,0.35);
      transition: transform .15s;
    }
    .btn.secondary {
      background: transparent;
      color: #FFFFFF;
      border: 1.5px solid rgba(43,191,178,0.5);
      box-shadow: none;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .small { font-size: 13px; opacity: 0.5; margin-top: 28px; }
    .small a { color: rgba(255,255,255,0.7); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="../assets/apps/firmapro.png" alt="FirmaPro" /></div>
    <h1>Firma<span class="accent">Pro</span></h1>
    <p class="subtitle">Küçük işletmenin cep muhasebecisi</p>
    <div class="spinner"></div>
    <p class="status">Google Play'e yönlendiriliyorsunuz…</p>
    <div class="actions">
      <a class="btn" href="https://play.google.com/store/apps/details?id=com.iscim.iscim">Google Play</a>
      <a class="btn secondary" href="https://firmapro.web.app">Web app</a>
    </div>
    <p class="small"><a href="https://bykdgstudio.github.io/">Bykdg Studio</a></p>
  </div>
  <script>
    setTimeout(function() {
      window.location.replace('https://play.google.com/store/apps/details?id=com.iscim.iscim');
    }, 600);
  </script>
</body>
</html>
