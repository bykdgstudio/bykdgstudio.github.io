<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Empyra — Mağazaya yönlendiriliyor</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at 50% 38%, #1B1F35 0%, #0C0E18 62%, #05060B 100%);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .card { max-width: 460px; width: 100%; text-align: center; }
    .icon {
      width: 130px; height: 130px;
      border-radius: 30px;
      overflow: hidden;
      margin: 0 auto 28px;
      border: 3px solid #C8862E;
      box-shadow: 0 12px 32px rgba(0,0,0,0.55), 0 0 60px rgba(224,106,44,0.32);
    }
    .icon img { width: 100%; height: 100%; display: block; }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: 1px; margin-bottom: 8px; }
    h1 .accent { color: #D9A441; }
    .subtitle { font-size: 15px; color: #D8CDBB; opacity: 0.8; margin-bottom: 36px; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 24px;
      border: 3px solid rgba(217,164,65,0.25);
      border-top-color: #D9A441;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 16px; font-weight: 500; opacity: 0.85; margin-bottom: 28px; }
    .actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #D9A441 0%, #A9701B 100%);
      color: #0C0E18;
      padding: 16px 28px;
      border-radius: 14px;
      font-size: 15px; font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(217,164,65,0.35);
      transition: transform .15s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .small { font-size: 13px; opacity: 0.55; margin-top: 28px; }
    .small a { color: rgba(255,255,255,0.75); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="../assets/apps/empyra.png" alt="Empyra" /></div>
    <h1>EMP<span class="accent">YRA</span></h1>
    <p class="subtitle">Üçlü eşleme bulmacası · Yaşayan diyar</p>
    <div class="spinner"></div>
    <p class="status" id="status">Google Play'e yönlendiriliyorsun…</p>
    <div class="actions">
      <a class="btn" id="googleBtn" href="https://play.google.com/store/apps/details?id=com.bykdg.empyra">Google Play</a>
    </div>
    <p class="small"><a href="https://bykdgstudio.github.io/">Bykdg Studio</a></p>
  </div>
  <script>
    (function() {
      var PLAY = 'https://play.google.com/store/apps/details?id=com.bykdg.empyra';
      setTimeout(function() {
        window.location.replace(PLAY);
      }, 600);
    })();
  </script>
</body>
</html>
