<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Shevana — Yakında</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at 50% 40%, #5B2EA8 0%, #341766 60%, #1B0838 100%);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .card { max-width: 460px; width: 100%; text-align: center; }
    .icon {
      width: 140px; height: 140px;
      border-radius: 32px;
      overflow: hidden;
      margin: 0 auto 32px;
      border: 3px solid #F472B6;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 60px rgba(244,114,182,0.3);
    }
    .icon img { width: 100%; height: 100%; display: block; }
    .tag {
      display: inline-block;
      background: rgba(244,114,182,0.18);
      border: 1.5px solid rgba(244,114,182,0.55);
      color: #F472B6;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 12px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    h1 { font-size: 38px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
    h1 .accent { color: #F472B6; }
    .subtitle { font-size: 17px; color: #E0CCFF; opacity: 0.85; margin-bottom: 36px; line-height: 1.45; }
    .features {
      text-align: left;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(244,114,182,0.25);
      border-radius: 18px;
      padding: 24px 26px;
      margin-bottom: 36px;
    }
    .features .feat {
      display: flex; gap: 12px; padding: 10px 0;
      align-items: center;
    }
    .features .feat:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .features .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #F472B6; flex-shrink: 0;
    }
    .features .label { font-size: 14px; opacity: 0.9; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #F472B6 0%, #C026D3 100%);
      color: #FFFFFF;
      padding: 16px 36px;
      border-radius: 14px;
      font-size: 16px; font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(244,114,182,0.35);
      transition: transform .15s;
    }
    .btn:hover { transform: translateY(-2px); }
    .small { font-size: 13px; opacity: 0.55; margin-top: 28px; }
    .small a { color: rgba(255,255,255,0.8); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="../assets/apps/shevana.png" alt="Shevana" /></div>
    <div class="tag">Yakında</div>
    <h1>Shev<span class="accent">ana</span></h1>
    <p class="subtitle">Cildine ne sürdüğünü artık biliyorsun.<br>Kozmetik içerik analizi + regl ve hamilelik takibi.</p>
    <div class="features">
      <div class="feat"><div class="dot"></div><div class="label">INCI içerik analizi · risk uyarıları</div></div>
      <div class="feat"><div class="dot"></div><div class="label">Regl &amp; ovülasyon takvimi</div></div>
      <div class="feat"><div class="dot"></div><div class="label">Hamilelik haftalık takip</div></div>
    </div>
    <a class="btn" href="https://www.instagram.com/bykdgstudio/">Instagram'da takip et</a>
    <p class="small"><a href="https://bykdgstudio.github.io/">Bykdg Studio</a></p>
  </div>
</body>
</html>
